# ═══════════════════════════════════════════════════════════════════
# MENU LIB - GUI Configuration Schema (golden spec)
# ═══════════════════════════════════════════════════════════════════
# One GUI per file inside the plugin's guis/ folder.
# Every field documented here is supported natively by SnLib: if the config
# user sets a supported field, it ALREADY works without plugin code.

title: string # default: "Menu"
rows: 1-6 # default: 3
open-sound: id # default: ''
close-sound: id # default: '' (played when the viewer closes the menu)
update-interval: int (in ticks) # every update-interval ticks, the menu will update all its information, including items, title, and rows. If set to 0, the menu will not update automatically. # defalt: 0
inventory-type: string # default: "CHEST" (can be any of the following: CHEST, DISPENSER, DROPPER, HOPPER, FURNACE, WORKBENCH, ENCHANTING, BREWING, ANVIL, BEACON, SHULKER_BOX, BARREL, etc)

# ═══════════════════════════════════════════════════════════════════
# PAGINATION - OPT-IN per menu
# ═══════════════════════════════════════════════════════════════════
# pagination: true  -> the GUI keeps ONE GuiSession + ONE Inventory PER VIEWER
#                      (real page-state per player: the same GUI can serve N
#                      players on different pages at the same time).
#                      [next-page]/[previous-page]/[set-page]/[refresh-page]
#                      work, and bindPaged fills the paged slots via API.
# pagination: false -> (default) pagination actions are silent no-ops with a
#                      debug note, and bindPaged WARNs once.
# Without a live bindPaged the total pages is unknown and the "next" nav item
# never disables, unless the plugin declares the total via
# GuiSession.setTotalPages(n).
pagination: true/false # default: false

# ═══════════════════════════════════════════════════════════════════
# LAYOUT - ASCII mask (alternative to slots:)
# ═══════════════════════════════════════════════════════════════════
# layout: optional list of 1-6 strings of up to 9 characters each, read top
# to bottom over the 9-column chest grid: the cell at row i / column j is
# slot i*9+j. ' ' (space) is ALWAYS an empty cell. Rows beyond 6 and
# characters beyond 9 per row are truncated with a WARN. With a layout
# present, rows derives from the number of layout rows; a contradictory
# rows: value WARNs and the layout wins. Items reference layout characters
# through their key: field (see example-layout-item below).
# layout:
#   - "fffffffff"
#   - "f ddddd f"
#   - "f ddddd f"
#   - "fffffffff"
#
# paged-key: menu-level, exactly ONE character of the layout: its cells
# become the target slots of the no-slots Java overload
# bindPaged(templateId, data, mapper), so plugins can page data without
# hardcoding an int[] (pagination: true required; with pagination false the
# value is kept but bindPaged stays ignored until pagination is enabled).
# An invalid paged-key, one absent from the layout or one declared without
# layout WARNs and is ignored.
# paged-key: d

# ═══════════════════════════════════════════════════════════════════
# STRICT CLICKS - OPT-IN per menu
# ═══════════════════════════════════════════════════════════════════
# strict-clicks: true  -> the generic click-actions list only fires with the
#                         four basic mouse clicks: LEFT, RIGHT, SHIFT_LEFT and
#                         SHIFT_RIGHT. Every other ClickType (Q, hotbar keys
#                         1-9, F, middle, double-click, etc) is cancelled
#                         without running anything (no click nor deny actions).
#                         Per-click specific lists still match their exact type
#                         even in strict mode: middle-click-actions enables
#                         MIDDLE, and a declared left-click-actions enables
#                         DOUBLE_CLICK and CREATIVE (the left side groups
#                         them). NUMBER_KEY, DROP, CONTROL_DROP, SWAP_OFFHAND
#                         and UNKNOWN have no possible specific list and stay
#                         always discarded in strict mode.
# strict-clicks: false -> (default) historic v1.0.0 behaviour: any ClickType
#                         fires the resolved actions list.
strict-clicks: true/false # default: false

items:
  item-id: #can be anything as long it is unique
    display-name: string # default: ""
    material: string (can resolve basehead-base64) #default: "STONE"
    skull-owner: string # player name or UUID; placeholders resolve per viewer; requires PLAYER_HEAD # default: ""
    attributes: list ex: ["ATTRIBUTE OPERATION amount [slot-group]"] # attribute modifiers, static values # default: []
    damage: int # initial vanilla damage already spent; needs a material with durability # default: not set
    custom-model-data: int # default: 0
    item-model: string # 1.21.2+ base ItemModel key, ex "nexo:2d_player_head"; no namespace -> minecraft:; independent of custom-model-data (both can coexist); skipped with one WARN below 1.21.2 # default: ""
    amount: int # default: 1
    slots: list ex: [0, 1, 2] or [0-2] or [0, 2, 4-6] # alternative: key (one layout character, see example-layout-item)
    glow: true/false # default: false
    enchantments: list ex: [enchantment-id, level] or [enchantment-id, level, enchantment-id, level] # default: []
    flags: # default: []
    - string (can be any of the following: HIDE_ENCHANTS, HIDE_ATTRIBUTES, HIDE_UNBREAKABLE, HIDE_DESTROYS, HIDE_PLACED_ON, HIDE_POTION_EFFECTS)
    - create a HIDE_ALL flag by adding all of the above flags to the list
    color: RGB # 235, 64, 52 or HEX # FF0000 (for any item that supports color, like leather armor) # default: ""
    trim-pattern: string (for leather armor only, can be any of the following: NONE, SILVER, GOLD, COPPER, IRON, DIAMOND, NETHERITE, REDSTONE, EMERALD, LAPIS, AMETHYST) # default: "NONE"
    trim-material: string (for leather armor only, can be any of the following: NONE, SILVER, GOLD, COPPER, IRON, DIAMOND, NETHERITE, REDSTONE, EMERALD, LAPIS, AMETHYST) # default: "NONE"
    potion-effects: list ex: [effect-id, level, duration] or [effect-id, level, duration, effect-id, level, duration] # default: []
    update-interval: int (in ticks) # every update-interval ticks, the item will update all its information, including items, title, and rows. If set to 0, the item will not update automatically. # defalt: 0
    lore: list (each line of lore) # default: []
    click-requirements: list of requirements to click this item, placeholders that have to match in order to click this item, if it doesn't match, the action will not be performed # default: []
      - "%placeholder% > 0 && %placeholder% < 10" #ex: %player_level% > 0 && %player_level% < 10
      - "%placeholder% = 1" #ex: %vault_balance% = 1
      - "%placeholder% != 1" #ex: %vault_balance% != 1
    view-requirements: list of requirements to view this item, placeholders that have to match in order to view this item, if it doesn't match, the item will not be displayed # default: []
      - "%placeholder% > 0 && %placeholder% < 10" #ex: %player_level% > 0 && %player_level% < 10
      - "%placeholder% = 1" #ex: %vault_balance% = 1
      - "%placeholder% != 1" #ex: %vault_balance% != 1
    deny-actions: all same actions as click-actions but with "deny" instead of "click" but the actions will be performed only if the click-requirements are not met # default: []
    click-actions: # list of actions to perform when the item is clicked,
      - "[player] spawn"          # run command as player
      - "[player-as-op] give %player% diamond 1" # run command as op player
      - "[right-click] spawn"     # run command as player when right-click
      - "[left-click] spawn"      # run command as player when left-click
      - "[shift-left-click] spawn"     # run command as player when shift-left-click
      - "[shift-right-click] spawn"     # run command as player when shift-right-click
      - "[right-click-only] spawn" # pure RIGHT: excludes shift-right and double-click
      - "[left-click-only] spawn" # pure LEFT: excludes shift-left, double-click and creative
      - "[click=MIDDLE,DROP] say hi" # generic guard against the ClickType enum, case-insensitive, - equals _
      - "[middle-click] say hi"   # exact MIDDLE click
      - "[double-click] say hi"   # exact DOUBLE_CLICK
      - "[drop-click] say hi"     # exact DROP (the Q key)
      - "[number-key] say hi"     # exact NUMBER_KEY (hotbar keys 1-9)
      - "[swap-offhand] say hi"   # exact SWAP_OFFHAND (the F key)
      # Compat note: [right-click]/[left-click] keep their inclusive v1.0.0
      # semantics ([right-click] also passes with SHIFT_RIGHT; [left-click]
      # also passes with SHIFT_LEFT, DOUBLE_CLICK and CREATIVE).
      # [click-block]/[click-air] exist too, but in a GUI the line is always
      # skipped (the click surface is null there; they are for world items,
      # see item-example.yml).
      - "[console] give %player% diamond 1" # run command as console
      - "[message] &aWelcome!"    # send message to player
      - "[sound] ENTITY_EXPERIENCE_ORB_PICKUP" # play sound
      - "[close]"                 # close the menu
      - "[open] gui-id"        # open another menu
      - "[connect] lobby"         # BungeeCord server switch
      - "[broadcastmessage] &e%player% joined!" # broadcast
      - "[actionbar] &aItem purchased!" # action bar message
      - "[title] &6Welcome;&eEnjoy your stay;20;40;20" # title message (title;subtitle;fadeIn;stay;fadeOut)
      - "[next-page]" # next page (pagination: true only)
      - "[previous-page]" # previous page (pagination: true only)
      - "[refresh-page]" # refresh page (pagination: true only)
      - "[set-page]" # set page (pagination: true only)
      - "[refresh-menu]" # refresh menu
      - "[custom]" #custom actions that plugins can create not need to be "custom" can be any string and the plugin will register its own action

    # ═══════════════════════════════════════════════════════════════════
    # PER-CLICK MATRIX - specific lists per click type (all optional)
    # ═══════════════════════════════════════════════════════════════════
    # Besides the generic click-actions / click-requirements / deny-actions,
    # five click keys each accept three optional lists (15 keys total).
    # Resolution is specific-over-generic and FIELD BY FIELD (actions,
    # requirement and deny list each resolve independently):
    #   1) the exact shift list of the click, when declared
    #      (SHIFT_RIGHT / SHIFT_LEFT)
    #   2) the side list, when declared (right covers RIGHT and SHIFT_RIGHT;
    #      left covers LEFT, SHIFT_LEFT, DOUBLE_CLICK and CREATIVE; middle
    #      covers MIDDLE)
    #   3) fallback to the generic click-actions / click-requirements /
    #      deny-actions
    # A list counts as declared only when it is non-empty. An item may declare
    # right-click-actions without right-click-requirements and its requirement
    # still resolves from the generic click-requirements. No existing menu
    # changes: every new key is optional.
    right-click-actions: list # default: []
    right-click-requirements: list # default: []
    right-click-deny-actions: list # default: []
    left-click-actions: list # default: []
    left-click-requirements: list # default: []
    left-click-deny-actions: list # default: []
    shift-right-click-actions: list # default: []
    shift-right-click-requirements: list # default: []
    shift-right-click-deny-actions: list # default: []
    shift-left-click-actions: list # default: []
    shift-left-click-requirements: list # default: []
    shift-left-click-deny-actions: list # default: []
    middle-click-actions: list # default: []
    middle-click-requirements: list # default: []
    middle-click-deny-actions: list # default: []

  # ═══════════════════════════════════════════════════════════════════
  # PAGINATION NAVIGATION ITEMS (only meaningful with pagination: true)
  # ═══════════════════════════════════════════════════════════════════
  # Navigation items are regular items whose click-actions use the pagination
  # actions. Each one supports an optional "nav-disabled" section: an item
  # override rendered in the SAME slots INSTEAD of the navigation item when
  # there is no page to go to (first page for previous, last page for next).
  # nav-disabled supports the same appearance fields as a regular item
  # (display-name, material, custom-model-data, item-model, amount, glow, lore, flags...)
  # but no slots and no actions: a disabled arrow never fires anything.

  previous-page:
    display-name: "[rgb]&lPrevious Page"
    material: ARROW
    slots: [45]
    click-actions:
      - "[previous-page]"
      - "[sound] UI_BUTTON_CLICK"
    nav-disabled: # shown on the first page instead of this item
      display-name: "&7No previous page"
      material: GRAY_STAINED_GLASS_PANE
      lore:
        - "&8You are on the first page"

  next-page:
    display-name: "[center][rgb]Next Page"
    material: ARROW
    slots: [53]
    click-actions:
      - "[next-page]"
      - "[sound] UI_BUTTON_CLICK"
    nav-disabled: # shown on the last page instead of this item
      display-name: "<gray>No next page</gray> &8(last page)"
      material: GRAY_STAINED_GLASS_PANE
      lore:
        - "&8You are on the last page"

  # ═══════════════════════════════════════════════════════════════════
  # TEXT PIPELINE EXAMPLES (SnText)
  # ═══════════════════════════════════════════════════════════════════
  # [small]  -> small caps glyph substitution: a-z and A-Z map to small cap
  #             glyphs, accented vowels lose the accent, enye keeps its default
  #             glyph, digits/symbols/color codes/MiniMessage tags pass through.
  #             Runs BEFORE [rgb] so the gradient colors the final glyphs.
  # [rgb]    -> per-character gradient interpolated over 7 fixed anchors
  #             (#F300F3,#5555FF,#55FFFF,#55FF55,#FCFF21,#FF9B00,#FF5327).
  #             Pre-existing COLOR codes are OVERRIDDEN; FORMAT codes
  #             (&l &o &n &m &k) are PRESERVED.
  # [center] -> centers the line at 154px, applied over the legacy-colored
  #             string (gradient already interpolated) as the LAST step
  #             before rendering to Component.
  # All three prefix tags ([small]/[rgb]/[center]) are composable in ANY order.
  # Legacy codes (&a, &#RRGGBB) and MiniMessage tags render together.

  example-text-item:
    display-name: "[rgb]&lEpic Gradient Title"
    material: NETHER_STAR
    slots: [22]
    lore:
      - "[center][rgb]Centered gradient line"
      - "[rgb][center]Same result, tags in any order"
      - "[center]&eCentered legacy-only line"
      - "[small]Small caps lore line"
      - "[center][small][rgb]All three tags composed"
      - "<bold><#55FFFF>MiniMessage</#55FFFF></bold> &7mixed with &alegacy codes"
      - "&7Hex legacy: &#FF9B00orange &7plus <italic>MiniMessage italic</italic>"

  # ═══════════════════════════════════════════════════════════════════
  # LAYOUT-KEYED ITEM - key: instead of slots: (requires a menu layout:)
  # ═══════════════════════════════════════════════════════════════════
  # key: exactly ONE character of the menu layout. The item renders in
  # EVERY layout cell holding that character (a filler key appearing in N
  # cells renders in the N slots). If both key and slots are declared,
  # slots wins with a WARN and key is ignored. A key that does not appear
  # in the layout (or an invalid multi-character key) ignores the item
  # with a WARN. Templates and nav-disabled sections do not support key.
  example-layout-item:
    display-name: "&7Filler"
    material: GRAY_STAINED_GLASS_PANE
    key: f

  # ═══════════════════════════════════════════════════════════════════
  # PLAYER HEAD ITEM - skull-owner resolves placeholders PER VIEWER
  # ═══════════════════════════════════════════════════════════════════
  # skull-owner accepts a player name or UUID; with a placeholder each viewer
  # sees their own resolved head. Requires material PLAYER_HEAD; an uncached
  # name falls back to the default head with one WARN.
  example-head-item:
    display-name: "&eYour head, %player_name%"
    material: PLAYER_HEAD
    skull-owner: '%player_name%'
    slots: [40]

# ═══════════════════════════════════════════════════════════════════
# CLOSE ACTIONS - menu-level (optional)
# ═══════════════════════════════════════════════════════════════════
# close-actions: same grammar as click-actions. Runs once per close, on the
# natural client close (ESC) and on the [close] action. Does NOT run on page
# changes or inventory recreations, nor when the plugin closes the session
# programmatically (reload, owner disable, quit cleanup). Click guards inside
# these lines are skipped with a debug note because there is no click.
# close-actions:
#   - "[message] &7See you soon!"
#   - "[sound] UI_BUTTON_CLICK"

# ═══════════════════════════════════════════════════════════════════
# TEMPLATES - Reusable items for plugin developers
# ═══════════════════════════════════════════════════════════════════
# Templates are IDENTICAL to items but WITHOUT "slots:".
# The plugin developer decides dynamically which slot(s) to place them in via Java API.
# The config user can customize the appearance freely (material, lore, actions, etc).
# Templates can use custom placeholders defined by the plugin (e.g. %index%, %warp_name%).
#
# Usage example (backpack plugin):
#   - Plugin defines: backpack-slots: [0,1,2,3,4]
#   - Plugin code decides per-player: slot 0 -> "backpack-available", slots 1-4 -> "backpack-locked"
#   - Config user customizes the look of each template

templates:
  template-id: # can be anything as long it is unique
    # Supports ALL the same fields as a regular item:
    display-name: string # default: ""
    material: string (can resolve basehead-base64) # default: "STONE"
    custom-model-data: int # default: 0
    item-model: string # 1.21.2+ base ItemModel key # default: ""
    amount: int # default: 1
    # NO "slots:" - the plugin assigns slots dynamically
    glow: true/false # default: false
    enchantments: list # default: []
    flags: list # default: []
    color: RGB/HEX # default: ""
    trim-pattern: string # default: "NONE"
    trim-material: string # default: "NONE"
    potion-effects: list # default: []
    update-interval: int # default: 0
    lore: list # default: []
    click-requirements: list # default: []
    view-requirements: list # default: []
    deny-actions: list # default: []
    click-actions: list # default: []
    # Templates also support the same per-click matrix keys as regular items
    # (right/left/shift-right/shift-left/middle x actions/requirements/
    # deny-actions) with the same specific-over-generic resolution.
