# Shared SnLib message keys (snlib.*), bundled inside SnLib.jar.
# The always-merge updater inserts any key missing from lang/messages_en.yml of every
# consumer on each start; existing values are never overwritten, so admins can restyle
# any line and keep their changes across updates.

snlib:
  # Sent when the sender lacks the permission required by a command or subcommand.
  no-permission: "&cYou do not have permission to use this command."
  # Sent when a command is used with missing or malformed arguments; {usage} is the correct syntax.
  usage: "&cUsage: &f{usage}"
  # Sent when an argument expected a number; {value} is the rejected input.
  invalid-number: "&cInvalid number: &f{value}"
  # Sent when an argument value is not one of the accepted options; {value} is the rejected input.
  invalid-value: "&cInvalid value: &f{value}"
  # Sent when a numeric argument falls outside its allowed range; {min}/{max} bound it and {value} is the rejected input.
  out-of-range: "&cValue must be between &f{min} &cand &f{max}&c: &f{value}"
  # Sent when an open-ended numeric argument is under its minimum; {min} is the floor and {value} the rejected input.
  number-too-small: "&cValue must be at least &f{min}&c: &f{value}"
  # Sent when an argument expected an online player; {value} is the rejected input.
  player-not-found: "&cPlayer not found: &f{value}"
  # Sent when the given subcommand does not exist; {value} is the unknown input.
  unknown-subcommand: "&cUnknown subcommand: &f{value}"
  # Sent to the sender after a successful reload.
  reload-done: "&aConfiguration reloaded."
  help:
    # Header line printed before the generated help entries; {plugin} is the plugin name.
    header: "&8&m----------&r &e&l{plugin} &8&m----------"
    # One line per subcommand visible to the sender; {usage} is its syntax, {description} its
    # description and {permission} its permission node.
    entry: "&e{usage} &7{description}"
    # Printed after the entries only when the help spans several pages; {command} is the root command name.
    footer: "&7Page &f{page}&7/&f{total} &8- &7/{command} help <page>"
  teleport:
    # Sent when a warmup teleport starts. Placeholder: {time} is the warmup in seconds.
    warmup: "&7Teleporting in &e{time}&7. Do not move."
    # Sent when a pending teleport is cancelled because the player moved.
    cancelled-move: "&cTeleport cancelled - you moved."
    # Sent when a pending teleport is cancelled because the player took damage.
    cancelled-damage: "&cTeleport cancelled - you took damage."
  selection:
    # Sent when a selection wand sets position 1. Placeholders: {x} {y} {z} {world}
    pos1-set: "&aPos1 set: &f{x}, {y}, {z} &7({world})"
    # Sent when a selection wand sets position 2. Placeholders: {x} {y} {z} {world}
    pos2-set: "&aPos2 set: &f{x}, {y}, {z} &7({world})"
    # Sent when the two positions are in different worlds.
    different-worlds: "&cBoth positions must be in the same world."
    # Sent when the selected cuboid exceeds the allowed volume. Placeholders: {volume} {max}
    too-big: "&cSelection too big: &f{volume} &7(max {max})"
    # Sent when the player lacks the wand permission.
    no-permission: "&cYou cannot use this wand."
    # Sent when a selection session expires by timeout.
    timeout: "&7Selection expired."
