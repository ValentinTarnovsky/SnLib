# ============================================================
#  SnLib - shared runtime of the Sn plugins
#  Managed config: keys added by future versions are merged in
#  on every start; your values and extra keys are preserved.
# ============================================================

# Master gate of the always-merge updater: false skips every yml merge except this file.
update-configs: true

# Runtime debug output of the library itself (also toggleable live, no restart needed).
debug:
  # Master toggle of the debug output.
  enabled: false
  # Verbosity threshold: OFF, INFO, DEBUG or TRACE.
  level: DEBUG
  # Category filter; an empty list lets every category through.
  categories: []

# Anonymous usage metrics via bStats (https://bstats.org); set false to opt out.
bstats: true

# SnBridge (EXPERIMENTAL): typed proxy<->backend channels over plugin messaging.
bridge:
  # Dedicated HMAC secret for frame authentication. Empty = use the Velocity modern
  # forwarding secret already present in config/paper-global.yml (recommended: zero
  # extra secrets to manage). Set only to decouple the bridge from secret rotation.
  hmac-secret: ""
  # Default queue TTL in seconds for sends waiting on a carrier/handshake.
  default-ttl-seconds: 30
  # Max queued messages per namespace; overflow resolves EXPIRED_TTL immediately.
  queue-cap: 256
  # Max bytes of one reassembled message (memory cap against hostile clients).
  max-message-bytes: 8388608
  # Max partially-received messages per connection.
  max-pending-messages: 8
  # Tier 2 console verb allowlist (backend-authoritative). EMPTY = deny every console
  # command. Anchored per-argument patterns only, never prefix wildcards. Tokens:
  #   literal        exact token
  #   <player>       a valid Minecraft name
  #   <word>         any single token
  #   <int:min..max> an integer within the inclusive range
  # Example: "crates key give <player> vote <int:1..64>"
  console-allowlist: []
  # Max console verb executions per second (rate limit, shared across all callers).
  console-rate-limit-per-second: 10
